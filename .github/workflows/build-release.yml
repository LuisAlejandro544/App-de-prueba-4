name: Build Release APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Permite disparar la compilación manualmente desde la pestaña Actions en GitHub

jobs:
  build:
    name: Build & Release Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compilar APK de Release (Sin caché de configuración)
        run: gradle :app:assembleRelease --no-configuration-cache

      - name: Subir APK generado como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ActionStack-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
