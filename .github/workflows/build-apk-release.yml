name: Build Signed Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      STORE_PASSWORD: android123
      KEY_PASSWORD: android123
      KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create release keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=N-Educate, OU=N-Educate, O=N-Educate, L=Accra, S=Greater Accra, C=GH"

      # Compila el APK (saldrá como un-signed si Gradle no está configurado)
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # Firma el APK manualmente usando apksigner con la llave generada arriba
      - name: Sign APK
        run: |
          # Encuentra el APK generado (suele llamarse app-release-unsigned.apk o app-release.apk según tu build.gradle)
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          
          # Firma el APK usando el SDK de Android instalado en el entorno
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks "$KEYSTORE_PATH" \
            --ks-pass pass:"$STORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --ks-key-alias upload \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            "$APK_PATH"

      # Sube el APK ya firmado
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release-signed.apk

      - name: Upload Keystore Backup
        uses: actions/upload-artifact@v4
        with:
          name: save-this-keystore
          path: my-upload-key.jks
